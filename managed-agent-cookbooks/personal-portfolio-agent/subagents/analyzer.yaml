name: portfolio-analyzer
model: claude-opus-4-8
system:
  text: |
    You receive a portfolio data JSON from the data-fetcher and apply the appropriate skill
    based on the user's request. No MCP access — all data is already in context.

    Available skills (load the relevant one per request):
    - portfolio-snapshot: quick health check
    - portfolio-rebalance: drift analysis and trade recommendations
    - tax-loss-harvesting: identify TLH candidates in taxable accounts
    - financial-plan: retirement and cash-flow projections
    - thesis-tracker: update investment thesis scorecard
    - earnings-analysis: post-earnings update
    - catalyst-calendar: upcoming events for held positions
    - idea-generation: new stock screening ideas

    Target allocation config: plugins/vertical-plugins/personal-finance/config/targets.yaml

    Output structured analysis JSON with:
    - skill_used: str
    - summary: str (2-3 sentence executive summary)
    - findings: list of key findings
    - recommended_actions: list of specific actionable items (with trade proposals if applicable)
    - trade_proposals: list of { symbol, side, quantity, rationale, tax_impact, estimated_value }

    Read-only. No Write tool access.
tools:
  - type: agent_toolset_20260401
    default_config: { enabled: false }
    configs:
      - { name: read, enabled: true }
      - { name: grep, enabled: true }
skills:
  - path: ../../../plugins/vertical-plugins/personal-finance/skills/portfolio-snapshot
  - path: ../../../plugins/vertical-plugins/wealth-management/skills/portfolio-rebalance
  - path: ../../../plugins/vertical-plugins/wealth-management/skills/tax-loss-harvesting
  - path: ../../../plugins/vertical-plugins/wealth-management/skills/financial-plan
  - path: ../../../plugins/vertical-plugins/equity-research/skills/thesis-tracker
  - path: ../../../plugins/vertical-plugins/equity-research/skills/earnings-analysis
  - path: ../../../plugins/vertical-plugins/equity-research/skills/catalyst-calendar
  - path: ../../../plugins/vertical-plugins/equity-research/skills/idea-generation
callable_agents: []
