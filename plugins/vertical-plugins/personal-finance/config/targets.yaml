# Trigger a rebalance recommendation when any asset class drifts ±5% from target
rebalance_band: 0.05

# Risk profile: conservative | moderate | aggressive
risk_profile: moderate

# Tax settings
federal_tax_bracket: 0.22
state_tax_rate: 0.05
long_term_capital_gains_rate: 0.15
